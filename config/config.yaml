# Orphanet XML parser config
# Input: Orphanet Scientific Knowledge XML
# raw_dumps : XML -> CSV (Dumps entire field)
# processed : merged and cleaned for downstream analyses


# run_name = Orphanet release date: YYMMDD
run_name: "260623"

#===== ROOT =====
ROOT: "/path/to/your/data/" # Base directory; Snakefile uses os.path.join(ROOT, run_name)

# ===== INPUT =====
inputs:
  in_root : "sources" # XML root directory (except classifications) / os.path.join(ROOT,run_name,in_root)
  classification_dir : "classifications"  # Classification XML directory under in_root / os.path.join(ROOT,run_name,in_root,classification_dir)

# ===== OUTPUT =====
outputs:
  out_root: "results" # Output root name (not directly used) / os.path.join(ROOT,run_name,out_root)
  rawdump_dir: "raw_dumps" # Raw dump CSV files / os.path.join(ROOT,run_name,out_root,rawdump_dir)
  final_dir: "processed" # Final processed CSV files / os.path.join(ROOT,run_name,out_root,final_dir)

# ===== SCRIPT DIRECTORY =====
# Rule usage example:
# shell: "python {config[script_dir]}/xxx.py -i {input.xml} -o {output.csv} > {log} 2>&1"
script_dir: "/path/to/orpha_parser/scripts"

# ===== LOG DIRECTORY =====
# Optional setting
# If not set: logs are saved to {out_root}/log
# If set: logs are saved to os.path.join(ROOT, run_name, out_root, log_dir)
# Directory is auto-created in rules/00_check.smk
# log_dir:


# ===== FINAL OUTPUT COLUMNS =====
# Column order for processed output (except OMIM handling)
# OMIM is split into:
#   - OMIM_gene     (placed before GeneSymbol)
#   - OMIM_disorder (placed before DisorderId)
# Required columns for the pipeline to run:
#   OrphaCode, DisorderId, GeneSymbol
# If HEADERS_TO_KEEP is null/None:
#   - all rawdump columns are merged (duplicates removed)
#   - OMIM is still split, but column order follows source files
# Comment out to disable
HEADERS_TO_KEEP: "
  OrphaCode
  DisorderId
  OMIM
  DisorderName
  DisorderType
  DisorderGeneAssociationListCount
  Ensembl
  GeneSymbol
  Synonyms
  AssociationType
  ClassificationPath
  AverageAgeOfOnset
  TypeOfInheritance
  PrevalenceEntries
  ExpertLink
  "


